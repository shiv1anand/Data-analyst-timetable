<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0f4f8;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    color: #2d3748;
  }

  /* TOP BAR */
  .topbar {
    background: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e2e8f0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }

  .topbar-left h1 {
    font-size: 17px;
    font-weight: 800;
    color: #2d3748;
  }

  .topbar-left p {
    font-size: 12px;
    color: #a0aec0;
    margin-top: 1px;
  }

  .clock-box {
    text-align: right;
  }

  .clock-box .time {
    font-size: 20px;
    font-weight: 800;
    color: #4f46e5;
    letter-spacing: 1px;
  }

  .clock-box .date {
    font-size: 11px;
    color: #a0aec0;
  }

  /* PROGRESS */
  .progress-wrap {
    background: #fff;
    margin: 16px;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-row span:first-child {
    font-size: 14px;
    font-weight: 700;
  }

  .progress-row span:last-child {
    font-size: 22px;
    font-weight: 800;
    color: #4f46e5;
  }

  .bar-bg {
    background: #edf2f7;
    border-radius: 100px;
    height: 10px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #4f46e5, #7c3aed);
    transition: width 0.5s ease;
    width: 0%;
  }

  .mini-stats {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .mini-stat {
    flex: 1;
    background: #f7fafc;
    border-radius: 10px;
    padding: 8px;
    text-align: center;
  }

  .mini-stat .n {
    font-size: 18px;
    font-weight: 800;
    display: block;
  }

  .mini-stat .l {
    font-size: 10px;
    color: #a0aec0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* CURRENT TASK BANNER */
  .now-banner {
    margin: 0 16px 16px;
    border-radius: 18px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(79,70,229,0.35);
  }

  .now-banner-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }

  .live-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: #86efac;
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }

  .now-section-name {
    font-size: 11px;
    font-weight: 700;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }

  .now-banner-main {
    padding: 10px 16px 12px;
  }

  .now-task-name {
    font-size: 17px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .now-meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .now-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 700;
  }

  .now-chip-icon { font-size: 13px; }

  .now-banner-bottom {
    background: rgba(0,0,0,0.15);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .next-up-label {
    font-size: 10px;
    font-weight: 700;
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .next-up-name {
    font-size: 12px;
    font-weight: 700;
    opacity: 0.85;
    margin-top: 1px;
  }

  /* progress ring */
  .time-ring-wrap {
    position: relative;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .time-ring-wrap svg {
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 4; }
  .ring-fill { fill: none; stroke: #86efac; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }

  .ring-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    color: #86efac;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* SECTIONS */
  .page-body {
    padding: 0 16px 80px;
  }

  .section {
    background: #fff;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }

  .sec-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    cursor: pointer;
    user-select: none;
    border-left: 4px solid transparent;
    transition: background 0.15s;
  }

  .sec-header:hover { background: #fafafa; }

  .sec-emoji { font-size: 18px; flex-shrink: 0; }

  .sec-info { flex: 1; }

  .sec-title {
    font-size: 14px;
    font-weight: 800;
    line-height: 1.2;
  }

  .sec-time {
    font-size: 11px;
    color: #a0aec0;
    margin-top: 1px;
  }

  .sec-arrow {
    color: #cbd5e0;
    font-size: 13px;
    transition: transform 0.25s;
  }

  .section.open .sec-arrow { transform: rotate(180deg); }

  .sec-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }

  .section.open .sec-body { max-height: 800px; }

  /* TASK */
  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-top: 1px solid #f0f4f8;
    cursor: pointer;
    transition: background 0.15s;
  }

  .task:hover { background: #fafafa; }

  .task.done { background: #f0fdf4; }

  .task.active {
    background: #fffbeb;
    border-left: 3px solid #f59e0b;
  }

  .cb {
    width: 22px; height: 22px;
    border: 2px solid #cbd5e0;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
    background: #fff;
  }

  .task.done .cb {
    background: #10b981;
    border-color: #10b981;
  }

  .tick {
    color: #fff;
    font-size: 13px;
    font-weight: 900;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .task.done .tick { opacity: 1; }

  .task-info { flex: 1; }

  .task-t {
    font-size: 11px;
    color: #a0aec0;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .task-n {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
  }

  .task.done .task-n {
    color: #a0aec0;
    text-decoration: line-through;
  }

  .task-note {
    font-size: 11px;
    color: #b2bec3;
    margin-top: 2px;
  }

  /* SLEEP CLOCKS */
  .sleep-clocks {
    margin: 0 16px 16px;
    display: none;
    gap: 10px;
  }

  .sleep-clocks.visible { display: flex; }

  .sleep-clock-card {
    flex: 1;
    background: #fff;
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    border-top: 3px solid #e2e8f0;
  }

  .sleep-clock-card.card-sleep  { border-top-color: #6366f1; }
  .sleep-clock-card.card-wake   { border-top-color: #10b981; }
  .sleep-clock-card.card-dur    { border-top-color: #f59e0b; }

  .sc-icon { font-size: 20px; margin-bottom: 4px; }

  .sc-value {
    font-size: 18px;
    font-weight: 800;
    color: #2d3748;
    line-height: 1;
    margin-bottom: 4px;
  }

  .sc-label {
    font-size: 10px;
    color: #a0aec0;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* RESET */
  .reset-btn {
    display: block;
    margin: 0 16px 16px;
    padding: 12px;
    background: #fff;
    border: 1.5px dashed #e2e8f0;
    border-radius: 12px;
    color: #e53e3e;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    width: calc(100% - 32px);
    transition: background 0.2s;
  }
  .reset-btn:hover { background: #fff5f5; }

  /* COLOR ACCENTS */
  .c-morning  { border-left-color: #10b981 !important; }
  .c-study    { border-left-color: #4f46e5 !important; }
  .c-break    { border-left-color: #f59e0b !important; }
  .c-lunch    { border-left-color: #06b6d4 !important; }
  .c-evening  { border-left-color: #f97316 !important; }
  .c-night    { border-left-color: #8b5cf6 !important; }
  .c-sleep    { border-left-color: #64748b !important; }

  /* WEEKLY */
  .weekly-wrap {
    margin: 0 16px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .weekly-wrap::-webkit-scrollbar { display: none; }

  .weekly-row {
    display: flex;
    gap: 8px;
    min-width: max-content;
  }

  .day-pill {
    background: #fff;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 8px 12px;
    text-align: center;
    min-width: 90px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .day-pill.today {
    border-color: #4f46e5;
    background: #eef2ff;
  }

  .dp-day {
    font-size: 11px;
    font-weight: 800;
    color: #a0aec0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }

  .day-pill.today .dp-day { color: #4f46e5; }

  .dp-topic {
    font-size: 11px;
    color: #4a5568;
    line-height: 1.3;
    font-weight: 600;
  }

  .section-label {
    font-size: 11px;
    font-weight: 800;
    color: #a0aec0;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 8px 16px 4px;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <h1>📊 Study Tracker</h1>
    <p>Data Analyst Ki Taiyaari</p>
  </div>
  <div class="clock-box">
    <div class="time" id="clock">--:--</div>
    <div class="date" id="dateStr"></div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-row">
    <span>Aaj Ka Progress</span>
    <span id="pct">0%</span>
  </div>
  <div class="bar-bg"><div class="bar-fill" id="fill"></div></div>
  <div class="mini-stats">
    <div class="mini-stat"><span class="n" id="done" style="color:#10b981">0</span><span class="l">Done ✅</span></div>
    <div class="mini-stat"><span class="n" id="left" style="color:#f59e0b">0</span><span class="l">Baaki ⏳</span></div>
    <div class="mini-stat"><span class="n" id="total" style="color:#4f46e5">0</span><span class="l">Total 📋</span></div>
  </div>
</div>

<!-- CURRENT TASK BANNER -->
<div class="now-banner">
  <div class="now-banner-top">
    <div class="live-pill"><span class="live-dot"></span> ABHI KARO</div>
    <div class="now-section-name" id="nowSectionName">—</div>
  </div>
  <div class="now-banner-main">
    <div class="now-task-name" id="nowTaskName">Loading...</div>
    <div class="now-meta-row">
      <div class="now-chip"><span class="now-chip-icon">🕐</span> <span id="nowStartTime">—</span></div>
      <div class="now-chip"><span class="now-chip-icon">🕔</span> <span id="nowEndTime">—</span></div>
      <div class="now-chip"><span class="now-chip-icon">⏱️</span> <span id="nowDuration">—</span></div>
      <div class="now-chip" style="background:rgba(134,239,172,0.25);color:#86efac"><span class="now-chip-icon">⏳</span> <span id="nowRemaining">—</span> baaki</div>
    </div>
  </div>
  <div class="now-banner-bottom">
    <div>
      <div class="next-up-label">Aage Kya Hai</div>
      <div class="next-up-name" id="nowNextTask">—</div>
    </div>
    <div class="time-ring-wrap">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <circle class="ring-bg" cx="24" cy="24" r="20"/>
        <circle class="ring-fill" cx="24" cy="24" r="20" id="ringFill"
          stroke-dasharray="125.6" stroke-dashoffset="125.6"/>
      </svg>
      <div class="ring-pct" id="ringPct">0%</div>
    </div>
  </div>
</div>

<!-- SLEEP CLOCKS (shown when So Jao banner is active) -->
<div class="sleep-clocks" id="sleepClocks">
  <div class="sleep-clock-card card-sleep">
    <div class="sc-icon">🌙</div>
    <div class="sc-value" id="scSoTime">10:00 PM</div>
    <div class="sc-label">Sone Ka Waqt</div>
  </div>
  <div class="sleep-clock-card card-wake">
    <div class="sc-icon">☀️</div>
    <div class="sc-value" id="scUthTime">6:00 AM</div>
    <div class="sc-label">Uthne Ka Waqt</div>
  </div>
  <div class="sleep-clock-card card-dur">
    <div class="sc-icon">⏰</div>
    <div class="sc-value" id="scDur">8 Ghante</div>
    <div class="sc-label">Poori Neend</div>
  </div>
</div>

<!-- WEEKLY -->
<div class="section-label">Is Hafte Ka Plan</div>
<div class="weekly-wrap">
  <div class="weekly-row" id="weeklyRow"></div>
</div>

<!-- SCHEDULE -->
<div class="page-body" id="schedule"></div>

<!-- RESET -->
<button class="reset-btn" onclick="resetDay()">🔄 Naya Din — Reset Karo</button>

<script>
const SCHEDULE = [
  { id:'morning', label:'Subah Ka Routine', emoji:'🌅', color:'c-morning', time:'6:00 – 7:25 AM', start:360, end:445,
    tasks:[
      {id:'t1', t:'6:00 AM', n:'Uthna + Fresh Water + Stretching', note:'5 min'},
      {id:'t2', t:'6:05 AM', n:'Yoga / Light Exercise', note:'30 min'},
      {id:'t3', t:'6:35 AM', n:'Nahana + Taiyaar Hona'},
      {id:'t4', t:'7:00 AM', n:'Breakfast 🍳', note:'Poha / Eggs / Daliya / Fruits'},
      {id:'t5', t:'7:20 AM', n:'Aaj Ka Plan Review (5 min)'},
    ]},
  { id:'s1', label:'Study Block 1 — SQL / Python', emoji:'📚', color:'c-study', time:'7:30 – 10:30 AM', start:450, end:630,
    tasks:[
      {id:'t6', t:'7:30 AM', n:'Deep Concept Study + Notes likhna', note:'SQL / Python — hardest topic pehle'},
      {id:'t7', t:'9:00 AM', n:'☕ Break — Paani piyo, aankhein rest', note:'10 min'},
      {id:'t8', t:'9:10 AM', n:'Hands-on Practice — Code + Queries likhna'},
    ]},
  { id:'b1', label:'Snack Break', emoji:'🍎', color:'c-break', time:'10:30 – 10:45 AM', start:630, end:645,
    tasks:[
      {id:'t9', t:'10:30 AM', n:'Snack lo + Screen se door raho', note:'Eyes rest zaroori hai'},
    ]},
  { id:'s2', label:'Study Block 2 — Stats / Power BI', emoji:'📊', color:'c-study', time:'10:45 AM – 1:00 PM', start:645, end:780,
    tasks:[
      {id:'t10', t:'10:45 AM', n:'Statistics / Power BI / Tableau — Concepts', note:'Notes banana important'},
      {id:'t11', t:'11:45 AM', n:'💧 Break — Paani piyo', note:'10 min'},
      {id:'t12', t:'11:55 AM', n:'Case Study / Visualization Practice'},
    ]},
  { id:'lunch', label:'Lunch + Rest', emoji:'🍱', color:'c-lunch', time:'1:00 – 2:30 PM', start:780, end:870,
    tasks:[
      {id:'t13', t:'1:00 PM', n:'Lunch 🍱', note:'Daal, roti, sabzi — nutritious khao'},
      {id:'t14', t:'1:30 PM', n:'Light Walk / Relax'},
      {id:'t15', t:'2:00 PM', n:'😴 Power Nap', note:'30 min — brain recharge'},
    ]},
  { id:'s3', label:'Study Block 3 — Projects + Interview', emoji:'💻', color:'c-study', time:'2:30 – 5:00 PM', start:870, end:1020,
    tasks:[
      {id:'t16', t:'2:30 PM', n:'Kaggle / Real Dataset / Project Work'},
      {id:'t17', t:'3:45 PM', n:'💧 Break', note:'10 min'},
      {id:'t18', t:'3:55 PM', n:'Interview Prep — SQL + Case Studies + HR'},
    ]},
  { id:'evening', label:'Evening Free Time 🎉', emoji:'🌤️', color:'c-evening', time:'5:00 – 7:30 PM', start:1020, end:1170,
    tasks:[
      {id:'t19', t:'5:00 PM', n:'Walk + Chai ☕ — Full Relax!', note:'ZERO study — deserve karte ho!'},
      {id:'t20', t:'5:45 PM', n:'Family Time / Music / Hobby'},
      {id:'t21', t:'6:30 PM', n:'Guilt-free chill time 😄'},
    ]},
  { id:'s4', label:'Study Block 4 — Revision', emoji:'🔁', color:'c-study', time:'7:30 – 8:10 PM', start:1170, end:1210,
    tasks:[
      {id:'t22', t:'7:30 PM', n:'Revision + Notes Review + Weak Topics'},
      {id:'t23', t:'7:55 PM', n:'YouTube Concept Video', note:'Relaxed mode mein dekho'},
    ]},
  { id:'night', label:'Raat Ka Routine', emoji:'🌙', color:'c-night', time:'8:10 PM – 9:50 PM', start:1210, end:1430,
    tasks:[
      {id:'t24', t:'8:10 PM', n:'Data Blogs / Articles — Light reading'},
      {id:'t25', t:'8:45 PM', n:'📝 Kal Ka To-Do List banana'},
      {id:'t26', t:'9:00 PM', n:'🍽️ Dinner', note:'Light khao raat ko'},
      {id:'t27', t:'9:30 PM', n:'Family / Music / Relax'},
      {id:'t28', t:'9:50 PM', n:'🧘 Meditation + Deep Breathing', note:'Phone band karo'},
    ]},
  { id:'sleep', label:'Neend — 8 Ghante', emoji:'😴', color:'c-sleep', time:'10:00 PM – 6:00 AM', start:1320, end:1800,
    tasks:[
      {id:'t29', t:'10:00 PM', n:'So jao 😴 — 8 ghante ki neend', note:'Brain memory consolidate karega!'},
    ]},
];

const WEEKLY = [
  {d:'Mon', t:'SQL — Joins, Subqueries'},
  {d:'Tue', t:'Python — Pandas, NumPy'},
  {d:'Wed', t:'Statistics + Probability'},
  {d:'Thu', t:'Power BI / Tableau'},
  {d:'Fri', t:'Excel + Data Cleaning'},
  {d:'Sat', t:'Projects + Kaggle'},
  {d:'Sun', t:'Revision + Rest 😌'},
];

const KEY = 'da_clean_' + new Date().toDateString();
let checked = JSON.parse(localStorage.getItem(KEY) || '{}');

// Render schedule
function render() {
  const el = document.getElementById('schedule');
  el.innerHTML = '';
  SCHEDULE.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section open';
    div.id = 'sec-' + sec.id;
    const tasks = sec.tasks.map(tk => `
      <div class="task ${checked[tk.id]?'done':''}" id="tk-${tk.id}" onclick="toggle('${tk.id}')">
        <div class="cb"><span class="tick">✓</span></div>
        <div class="task-info">
          <div class="task-t">${tk.t}</div>
          <div class="task-n">${tk.n}</div>
          ${tk.note ? `<div class="task-note">💬 ${tk.note}</div>` : ''}
        </div>
      </div>`).join('');
    div.innerHTML = `
      <div class="sec-header ${sec.color}" onclick="toggleSec('sec-${sec.id}')">
        <span class="sec-emoji">${sec.emoji}</span>
        <div class="sec-info">
          <div class="sec-title">${sec.label}</div>
          <div class="sec-time">${sec.time}</div>
        </div>
        <span class="sec-arrow">▾</span>
      </div>
      <div class="sec-body">${tasks}</div>`;
    el.appendChild(div);
  });
  updateProg();
}

function toggle(id) {
  checked[id] = !checked[id];
  localStorage.setItem(KEY, JSON.stringify(checked));
  const el = document.getElementById('tk-' + id);
  checked[id] ? el.classList.add('done') : el.classList.remove('done');
  updateProg();
}

function toggleSec(id) {
  document.getElementById(id).classList.toggle('open');
}

function updateProg() {
  const all = SCHEDULE.flatMap(s => s.tasks);
  const t = all.length, d = all.filter(x => checked[x.id]).length;
  const p = t ? Math.round(d/t*100) : 0;
  document.getElementById('fill').style.width = p + '%';
  document.getElementById('pct').textContent = p + '%';
  document.getElementById('done').textContent = d;
  document.getElementById('left').textContent = t - d;
  document.getElementById('total').textContent = t;
}

function resetDay() {
  if (!confirm('Reset karna chahte ho?')) return;
  checked = {};
  localStorage.setItem(KEY, JSON.stringify(checked));
  render();
}

// Weekly strip
function renderWeekly() {
  const today = new Date().getDay();
  const order = [1,2,3,4,5,6,0];
  const row = document.getElementById('weeklyRow');
  row.innerHTML = '';
  order.forEach((d, i) => {
    const isToday = d === today;
    const chip = document.createElement('div');
    chip.className = 'day-pill' + (isToday ? ' today' : '');
    chip.innerHTML = `<div class="dp-day">${WEEKLY[i].d}</div><div class="dp-topic">${WEEKLY[i].t}</div>`;
    row.appendChild(chip);
  });
  const idx = order.indexOf(today);
  if (idx >= 0) setTimeout(() => row.children[idx]?.scrollIntoView({inline:'center', behavior:'smooth', block:'nearest'}), 300);
}
